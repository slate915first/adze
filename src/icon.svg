<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Adze parchment/dark gradient -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="60%" stop-color="#0a0612"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4e4bc"/>
      <stop offset="100%" stop-color="#d4a857"/>
    </linearGradient>
    <radialGradient id="goldRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4e4bc"/>
      <stop offset="80%" stop-color="#d4a857"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background (PWA mask-safe) -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Dharmachakra wheel · 8 spokes, centered, gold on dark.
       Coordinates centered around (256, 256), outer radius 180. -->
  <g transform="translate(256 256)">
    <!-- Outer ring -->
    <circle r="178" fill="none" stroke="url(#gold)" stroke-width="14"/>
    <!-- Inner hub -->
    <circle r="42" fill="url(#goldRadial)"/>
    <circle r="20" fill="#1a1530"/>

    <!-- 8 spokes via group rotation -->
    <g stroke="url(#gold)" stroke-width="12" stroke-linecap="round">
      <line x1="0" y1="-160" x2="0" y2="-50"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(45)"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(90)"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(135)"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(180)"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(225)"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(270)"/>
      <line x1="0" y1="-160" x2="0" y2="-50" transform="rotate(315)"/>
    </g>

    <!-- Spoke tips (small caps for that classical-bell look) -->
    <g fill="url(#gold)">
      <circle cx="0" cy="-160" r="8"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(45)"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(90)"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(135)"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(180)"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(225)"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(270)"/>
      <circle cx="0" cy="-160" r="8" transform="rotate(315)"/>
    </g>
  </g>
</svg>
