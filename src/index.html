<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adze — The Path of Awakening</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles/styles.css">
</head>
<body>

<div id="app" class="max-w-6xl mx-auto p-4 md:p-6"></div>
<div id="modal-root"></div>

<!-- Floating beta-feedback button. Fixed bottom-right, always visible so a
     tester can report without hunting for Settings. Short tap = feedback
     menu; toggling feedback mode lets any on-screen element be tapped to
     report it specifically. -->
<button id="feedback-fab"
        class="feedback-fab"
        onclick="handleFeedbackFabTap()"
        title="Tap: feedback menu · Shift-tap: toggle element mode">
  💬
</button>

<!-- Banner that appears when element feedback mode is on. -->
<div id="feedback-banner" class="feedback-banner" style="display:none">
  <b>BETA FEEDBACK MODE</b> · tap any highlighted element to report what's wrong with it ·
  <button onclick="setFeedbackMode(false)" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:2px 8px;border-radius:4px;margin-left:8px;cursor:pointer;font-size:11px;">exit</button>
</div>

<!-- ========================================================================
     Script load order (classic scripts; all share global scope).

     1. engine/ and config.js define primitives and hardcoded constants.
     2. data/loaders.js exposes an async window.loadAllData() — it does not
        run at script-parse time; bootstrap.js awaits it later.
     3. systems/, render/, modals/ each define functions that close over
        `state` and `view`. They're declared but not called at load time.
     4. main.js defines render() and renderModal() dispatchers.
     5. bootstrap.js is last: it awaits loadAllData(), initializes state/view,
        and calls render(). The app comes alive here and only here.
     ======================================================================== -->
